<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Quiz Assistant - Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>🤖 AI Quiz Assistant</h1>
      <p class="subtitle">Powered by OpenRouter (Free Models)</p>
    </header>

    <main class="popup-content">
      <div class="settings-section">
        <h2>API Configuration</h2>
        
        <div class="form-group">
          <label for="apiKey">OpenRouter API Key</label>
          <input type="password" id="apiKey" placeholder="Enter your OpenRouter API key" autocomplete="off">
          <p class="hint">Get your free API key at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></p>
        </div>

        <div class="form-group">
          <label for="model">AI Model (Free)</label>
          <select id="model">
            <option value="google/gemma-4-26b-a4b-it:free">Google Gemma 4 (26B) - Recommended</option>
            <option value="google/gemma-4-31b-it:free">Google Gemma 4 (31B) - More Powerful</option>
            <option value="openrouter/free">Auto-Select Best Free Model</option>
            <option value="minimax/minimax-m2.5:free">MiniMax M2.5</option>
            <option value="nvidia/nemotron-3-nano-30b-a3b:free">NVIDIA Nemotron Nano</option>
          </select>
          <p class="hint">All models are 100% free with rate limits</p>
        </div>
      </div>

      <div class="settings-section">
        <h2>Preferences</h2>
        
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="autoDetect">
            Auto-detect quiz questions on page load
          </label>
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="showExplanations" checked>
            Show explanations with answers
          </label>
        </div>
      </div>

      <div class="info-box">
        <p>✅ <strong>No billing required!</strong> All models are completely free.</p>
        <p>📚 <a href="https://openrouter.ai/models?pricing=free" target="_blank">View all free models →</a></p>
      </div>
    </main>

    <footer class="popup-footer">
      <button id="saveBtn" class="btn-primary">Save Settings</button>
      <button id="testBtn" class="btn-secondary">Test Connection</button>
      <div id="statusMessage" class="status-message"></div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
