<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      background: #f5f5f5;
    }
    canvas {
      margin: 10px;
      border: 1px solid #ddd;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
    }
    button:hover {
      background: hsl(210, 56%, 47%);
    }
    .info {
      margin-top: 20px;
      padding: 16px;
      background: white;
      border-radius: 8px;
      max-width: 500px;
    }
  </style>
</head>
<body>
  <h1>Retro Icon Generator</h1>
  <p>Click the buttons below to download the required icon files</p>
  
  <div>
    <canvas id="canvas16" width="16" height="16"></canvas>
    <canvas id="canvas48" width="48" height="48"></canvas>
    <canvas id="canvas128" width="128" height="128"></canvas>
  </div>
  
  <div>
    <button onclick="downloadIcon(16)">Download icon16.png</button>
    <button onclick="downloadIcon(48)">Download icon48.png</button>
    <button onclick="downloadIcon(128)">Download icon128.png</button>
    <button onclick="downloadAll()">Download All</button>
  </div>
  
  <div class="info">
    <h3>Instructions:</h3>
    <ol>
      <li>Click each download button to save the PNG files</li>
      <li>Move the downloaded files to the <code>icons/</code> folder</li>
      <li>Reload the extension in chrome://extensions/</li>
    </ol>
  </div>

  <script>
    function drawRoundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, size, size);

      // Background
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#ff7b5c');
      gradient.addColorStop(1, '#ffbd56');

      const radius = size * 0.2;
      ctx.fillStyle = gradient;
      drawRoundedRect(ctx, 0, 0, size, size, radius);
      ctx.fill();

      // Scanlines
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      for (let y = 2; y < size; y += 4) {
        ctx.fillRect(0, y, size, 1);
      }

      // Floppy disk body
      const diskX = size * 0.18;
      const diskY = size * 0.15;
      const diskW = size * 0.64;
      const diskH = size * 0.7;
      const diskR = Math.max(2, size * 0.09);

      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      drawRoundedRect(ctx, diskX + size * 0.02, diskY + size * 0.02, diskW, diskH, diskR);
      ctx.fill();

      ctx.fillStyle = '#222e42';
      drawRoundedRect(ctx, diskX, diskY, diskW, diskH, diskR);
      ctx.fill();

      // Shutter
      const shutterX = diskX + diskW * 0.13;
      const shutterY = diskY + diskH * 0.11;
      const shutterW = diskW * 0.74;
      const shutterH = Math.max(2, diskH * 0.22);

      ctx.fillStyle = '#a1b0c2';
      drawRoundedRect(ctx, shutterX, shutterY, shutterW, shutterH, Math.max(1, size * 0.03));
      ctx.fill();

      ctx.fillStyle = 'rgba(104,120,140,0.75)';
      ctx.fillRect(shutterX, shutterY + shutterH * 0.45, shutterW, Math.max(1, shutterH * 0.2));

      // Label
      const labelX = diskX + diskW * 0.13;
      const labelY = diskY + diskH * 0.43;
      const labelW = diskW * 0.74;
      const labelH = diskH * 0.36;

      ctx.fillStyle = '#f5ecd4';
      drawRoundedRect(ctx, labelX, labelY, labelW, labelH, Math.max(1, size * 0.03));
      ctx.fill();

      ctx.fillStyle = '#e96756';
      ctx.fillRect(labelX + 1, labelY + labelH * 0.24, labelW - 2, Math.max(1, labelH * 0.1));

      ctx.fillStyle = 'rgba(67,83,109,0.4)';
      ctx.fillRect(labelX + 1, labelY + labelH * 0.52, labelW - 2, Math.max(1, labelH * 0.07));

      // Notch + LED
      const notchW = Math.max(2, diskW * 0.14);
      const notchH = Math.max(2, diskH * 0.13);
      ctx.fillStyle = '#161f2f';
      ctx.fillRect(diskX + diskW - notchW - 1, diskY + 1, notchW, notchH);

      const led = Math.max(1, size * 0.05);
      ctx.fillStyle = '#ee5454';
      ctx.fillRect(diskX + diskW * 0.16, diskY + diskH * 0.87, led, led);
    }
    
    function downloadIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      drawIcon(canvas, size);
      
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    function downloadAll() {
      setTimeout(() => downloadIcon(16), 100);
      setTimeout(() => downloadIcon(48), 300);
      setTimeout(() => downloadIcon(128), 500);
    }
    
    // Draw preview on load
    drawIcon(document.getElementById('canvas16'), 16);
    drawIcon(document.getElementById('canvas48'), 48);
    drawIcon(document.getElementById('canvas128'), 128);
  </script>
</body>
</html>
